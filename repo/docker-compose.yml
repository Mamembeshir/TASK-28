services:
  app:
    build: .
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      - DATABASE_URL=postgres://eduexchange:eduexchange@db:5432/eduexchange?sslmode=disable
      - DATABASE_URL_TEST=postgres://eduexchange:eduexchange@db:5432/eduexchange_test?sslmode=disable
      - PORT=8080
      - SESSION_SECRET=${SESSION_SECRET:-dev-session-secret-change-in-prod}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-dev-encryption-key-32-bytes-long}
      - FACILITY_TIMEZONE=${FACILITY_TIMEZONE:-America/New_York}
      - UPLOAD_PATH=/app/data/uploads
      - EXPORT_PATH=/app/data/exports
      - STATEMENT_PATH=/app/data/statements
    env_file:
      - path: .env
        required: false
    volumes:
      - app-data:/app/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Dedicated test runner — uses builder image (has Go toolchain).
  # Usage: docker-compose run --rm test bash run_tests.sh [--unit|--integration|--frontend|--coverage]
  test:
    build:
      context: .
      target: builder
    working_dir: /build
    volumes:
      - .:/build  # live source mount — no rebuild needed after file changes
    environment:
      - DATABASE_URL=postgres://eduexchange:eduexchange@db:5432/eduexchange?sslmode=disable
      - DATABASE_URL_TEST=postgres://eduexchange:eduexchange@db:5432/eduexchange_test?sslmode=disable
      - GONOSUMDB=*
      - GOFLAGS=-mod=mod
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - test

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=eduexchange
      - POSTGRES_PASSWORD=eduexchange
      - POSTGRES_DB=eduexchange
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eduexchange"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  app-data:
